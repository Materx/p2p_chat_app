<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Chat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #111418;
    --border:   #1e2530;
    --accent:   #00e5ff;
    --accent2:  #ff3cac;
    --text:     #e2e8f0;
    --muted:    #4a5568;
    --mine-bg:  #0d2b3e;
    --peer-bg:  #1a1035;
    --success:  #00ff88;
    --warn:     #ffcc00;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 70%);
    top: -200px; left: -200px;
    pointer-events: none;
    z-index: 0;
    animation: orb 12s ease-in-out infinite alternate;
  }

  @keyframes orb {
    to { transform: translate(400px, 300px); }
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    animation: fadeDown 0.5s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.4);
  }

  .logo span { color: var(--accent2); }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.4s, box-shadow 0.4s;
  }
  .dot.online  { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .dot.waiting { background: var(--warn);    box-shadow: 0 0 8px var(--warn); animation: pulse 1.4s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Join screen ── */
  #join-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    animation: fadeUp 0.6s ease both;
  }

  .join-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    text-align: center;
    line-height: 1.2;
  }
  .join-title em { font-style: normal; color: var(--accent); }
  .join-title small {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.12em;
  }

  .join-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 380px;
  }

  .field-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,255,0.1);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn {
    padding: 13px 24px;
    border: none;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover {
    background: #33ecff;
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }

  .room-hint {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
  }
  .room-hint strong { color: var(--accent); }

  /* ── Chat screen ── */
  #chat-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    gap: 0;
    min-height: 0;
  }

  .room-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 0.7rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.08em;
  }
  .room-bar .room-id { color: var(--accent); }

  /* ── System banner ── */
  #system-banner {
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    margin: 10px 0 6px;
    display: none;
    animation: fadeUp 0.3s ease both;
  }
  #system-banner.waiting  { background: rgba(255,204,0,0.08);  color: var(--warn);    border: 1px solid rgba(255,204,0,0.2); }
  #system-banner.connected{ background: rgba(0,255,136,0.06);  color: var(--success); border: 1px solid rgba(0,255,136,0.2); }
  #system-banner.error    { background: rgba(255,60,172,0.08); color: var(--accent2); border: 1px solid rgba(255,60,172,0.2); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 78%;
    animation: msgIn 0.25s ease both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  .msg.mine  { align-self: flex-end;  align-items: flex-end; }
  .msg.peer  { align-self: flex-start; align-items: flex-start; }

  .msg-meta {
    font-size: 0.6rem;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.06em;
  }
  .msg.mine .msg-meta { color: rgba(0,229,255,0.5); }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.875rem;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.mine .msg-bubble {
    background: var(--mine-bg);
    border: 1px solid rgba(0,229,255,0.15);
    border-bottom-right-radius: 3px;
    color: #d0f0ff;
  }
  .msg.peer .msg-bubble {
    background: var(--peer-bg);
    border: 1px solid rgba(255,60,172,0.15);
    border-bottom-left-radius: 3px;
    color: #e8d8ff;
  }

  /* ── Input bar ── */
  .input-bar {
    display: flex;
    gap: 10px;
    padding: 12px 0 8px;
    border-top: 1px solid var(--border);
  }

  #msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 44px;
    min-height: 44px;
    max-height: 120px;
  }
  #msg-input:focus { border-color: var(--accent); }

  #send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #33ecff; box-shadow: 0 0 16px rgba(0,229,255,0.3); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn svg { width: 18px; height: 18px; }

  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">P2P<span>·</span>CHAT</div>
    <div class="status-dot">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">OFFLINE</span>
    </div>
  </header>

  <!-- Join Screen -->
  <div id="join-screen">
    <div class="join-title">
      <em>Direct.</em> Peer-to-Peer.<br>No middleman.
      <small>// OPEN IN TWO TABS · SAME ROOM ID</small>
    </div>
    <div class="join-form">
      <div>
        <div class="field-label">// YOUR NAME</div>
        <input type="text" id="name-input" placeholder="anonymous" maxlength="24" autocomplete="off">
      </div>
      <div>
        <div class="field-label">// ROOM ID</div>
        <input type="text" id="room-input" placeholder="e.g. alpha-7" maxlength="32" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="joinChat()">CONNECT →</button>
    </div>
    <div class="room-hint">
      Both peers must enter the <strong>same room ID</strong>.<br>
      Max 2 people per room.
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="room-bar">
      <span>ROOM <span class="room-id" id="room-display"></span></span>
      <span id="peer-label">WAITING FOR PEER…</span>
    </div>
    <div id="system-banner"></div>
    <div id="messages"></div>
    <div class="input-bar">
      <textarea id="msg-input" placeholder="Type a message…" rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const socket = io();
  let myName = "";
  let myRoom = "";
  let mySid  = "";

  // ── Connection status ──────────────────────────────────────────
  socket.on("connect", () => {
    mySid = socket.id;
    setDot("online", "CONNECTED");
  });
  socket.on("disconnect", () => setDot("", "OFFLINE"));

  function setDot(state, label) {
    const dot = document.getElementById("conn-dot");
    const lbl = document.getElementById("conn-label");
    dot.className = "dot " + state;
    lbl.textContent = label;
  }

  // ── Join ──────────────────────────────────────────────────────
  function joinChat() {
    const nameEl = document.getElementById("name-input");
    const roomEl = document.getElementById("room-input");
    myName = nameEl.value.trim() || "anonymous";
    myRoom = roomEl.value.trim() || "lobby";

    socket.emit("join", { name: myName, room: myRoom });

    document.getElementById("join-screen").style.display = "none";
    const cs = document.getElementById("chat-screen");
    cs.style.display = "flex";
    cs.style.animation = "fadeUp 0.4s ease both";
    document.getElementById("room-display").textContent = myRoom;
    document.getElementById("msg-input").focus();
  }

  // ── Status messages from server ───────────────────────────────
  socket.on("status", ({ msg, type }) => {
    const banner = document.getElementById("system-banner");
    banner.textContent = "// " + msg;
    banner.className = type;
    banner.style.display = "block";
    if (type === "waiting") setDot("waiting", "WAITING");
  });

  socket.on("peer_joined", ({ name }) => {
    const banner = document.getElementById("system-banner");
    banner.textContent = `// ${name} joined the room.`;
    banner.className = "connected";
    banner.style.display = "block";
    document.getElementById("peer-label").textContent = name.toUpperCase();
    setDot("online", "CONNECTED");
    addSystemMsg(`${name} connected`);
  });

  socket.on("peer_left", ({ name }) => {
    document.getElementById("peer-label").textContent = "PEER DISCONNECTED";
    setDot("waiting", "WAITING");
    addSystemMsg(`${name} left the room`);
  });

  // ── Messages ──────────────────────────────────────────────────
  socket.on("message", ({ name, text, sid }) => {
    const isMine = sid === socket.id;
    addMessage(name, text, isMine);
  });

  function addMessage(name, text, isMine) {
    const msgs = document.getElementById("messages");
    const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const div = document.createElement("div");
    div.className = "msg " + (isMine ? "mine" : "peer");
    div.innerHTML = `
      <div class="msg-meta">${isMine ? "you" : name} · ${now}</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addSystemMsg(text) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.style.cssText = "text-align:center;font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;padding:4px 0;";
    div.textContent = "── " + text + " ──";
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById("msg-input");
    const text = input.value.trim();
    if (!text) return;
    socket.emit("message", { text });
    input.value = "";
    input.style.height = "44px";
    input.focus();
  }

  // Enter to send, Shift+Enter for newline
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("msg-input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    document.getElementById("name-input").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("room-input").focus();
    });
    document.getElementById("room-input").addEventListener("keydown", e => {
      if (e.key === "Enter") joinChat();
    });
  });

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
