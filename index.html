<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MeowChat 🐱</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7ec8e3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MeowChat">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="description" content="Cute private P2P chat app 🐱">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --bg:#f0f8ff;--surface:#fff;--blue:#89c4e1;--blue-soft:#b8dff0;--blue-pale:#dff0f9;
  --mint:#a8e6cf;--mint-soft:#c8f0e0;--mint-pale:#e8faf2;
  --text:#3a4a5c;--muted:#8fa3b1;--shadow:rgba(137,196,225,0.18);--shadow2:rgba(137,196,225,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
.blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:.35;pointer-events:none;z-index:0;animation:float 10s ease-in-out infinite alternate}
.blob1{width:380px;height:380px;background:var(--blue-soft);top:-100px;left:-100px}
.blob2{width:300px;height:300px;background:var(--mint);top:40%;right:-80px;animation-delay:-3s}
.blob3{width:220px;height:220px;background:var(--blue-pale);bottom:-60px;left:30%;animation-delay:-6s}
@keyframes float{from{transform:translateY(0)scale(1)}to{transform:translateY(-30px)scale(1.05)}}
#app{position:relative;z-index:1;width:100%;max-width:600px;height:100vh;margin:0 auto;display:flex;flex-direction:column;padding:0 20px}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--text)}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--mint));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 14px var(--shadow)}
.status-chip{display:flex;align-items:center;gap:6px;background:#fff;border-radius:20px;padding:5px 12px 5px 8px;font-size:.7rem;font-weight:500;color:var(--muted);box-shadow:0 2px 10px var(--shadow2)}
.status-chip .dot{width:7px;height:7px;border-radius:50%;background:#d0dce6;transition:background .4s}
.status-chip.online{color:#5baa88}.status-chip.online .dot{background:var(--mint);box-shadow:0 0 6px var(--mint)}
.status-chip.waiting{color:var(--blue)}.status-chip.waiting .dot{background:var(--blue);box-shadow:0 0 6px var(--blue);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)scale(.97)}to{opacity:1;transform:none}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
@keyframes dotB{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}
#splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.splash-icon{font-size:3.5rem;animation:bounce 1.2s ease-in-out infinite alternate}
.splash-text{font-size:.8rem;color:var(--muted);font-weight:500}
.splash-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);margin:0 2px;animation:dotB 1s ease-in-out infinite}
.splash-dots span:nth-child(2){animation-delay:.15s;background:var(--mint)}.splash-dots span:nth-child(3){animation-delay:.3s}
#join-screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.join-card{background:#fff;border-radius:28px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 8px 40px var(--shadow),0 2px 8px var(--shadow2);display:flex;flex-direction:column;gap:20px}
.join-header{text-align:center}
.join-emoji{font-size:2.8rem;margin-bottom:8px;display:block}
.join-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--text);margin-bottom:4px}
.join-sub{font-size:.78rem;color:var(--muted)}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
input[type=text]{background:var(--bg);border:1.5px solid var(--blue-pale);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;padding:11px 16px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(137,196,225,.15)}
input[type=text]::placeholder{color:#c0d0da}
.btn-group{display:flex;flex-direction:column;gap:10px}
.btn{font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;padding:13px 20px;border-radius:12px;border:none;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1)}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--mint));color:#fff;box-shadow:0 4px 16px var(--shadow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--shadow)}
.btn-secondary{background:var(--bg);color:var(--blue);border:1.5px solid var(--blue-soft)}
.btn-secondary:hover{background:var(--blue-pale)}
#join-link-box{display:none;flex-direction:column;gap:10px;width:100%;max-width:400px;background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 20px var(--shadow2)}
#chat-screen{flex:1;display:none;flex-direction:column;min-height:0;animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both}
.chat-topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 12px;flex-shrink:0}
.peer-info{display:flex;align-items:center;gap:10px}
.peer-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--blue-soft),var(--mint-soft));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 2px 10px var(--shadow2)}
.peer-name{font-size:.85rem;font-weight:600;color:var(--text)}
.peer-status{font-size:.68rem;color:var(--muted)}
.share-box{display:none;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:10px;box-shadow:0 2px 14px var(--shadow2);border:1.5px solid var(--blue-pale);flex-shrink:0}
.share-box.visible{display:flex}
.share-url{flex:1;font-size:.7rem;color:var(--blue);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.copy-btn{font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;padding:6px 14px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--blue),var(--mint));color:#fff;cursor:pointer;transition:all .2s;flex-shrink:0;box-shadow:0 2px 8px var(--shadow)}
.copy-btn:hover{transform:scale(1.05)}.copy-btn.copied{background:var(--mint)}
#system-banner{font-size:.75rem;padding:8px 14px;border-radius:12px;margin-bottom:8px;display:none;font-weight:500;flex-shrink:0}
#system-banner.waiting{background:var(--blue-pale);color:var(--blue)}
#system-banner.connected{background:var(--mint-pale);color:#5baa88}
#system-banner.error{background:#ffe8ec;color:#e05a7a}
#messages{flex:1;overflow-y:auto;padding:4px 0 16px;display:flex;flex-direction:column;gap:8px;min-height:0;scrollbar-width:thin;scrollbar-color:var(--blue-pale) transparent}
.msg{display:flex;flex-direction:column;max-width:75%;animation:msgIn .25s cubic-bezier(.4,0,.2,1) both}
.msg.mine{align-self:flex-end;align-items:flex-end}.msg.peer{align-self:flex-start;align-items:flex-start}
.msg-meta{font-size:.62rem;color:var(--muted);margin-bottom:3px;font-weight:500}
.msg-bubble{padding:10px 15px;font-size:.875rem;line-height:1.5;word-break:break-word}
.msg.mine .msg-bubble{background:linear-gradient(135deg,var(--blue),#74bbd8);color:#fff;border-radius:18px 18px 4px 18px;box-shadow:0 4px 14px rgba(137,196,225,.35)}
.msg.peer .msg-bubble{background:#fff;color:var(--text);border-radius:18px 18px 18px 4px;box-shadow:0 2px 10px var(--shadow2);border:1.5px solid var(--blue-pale)}
.sys-msg{text-align:center;font-size:.65rem;color:var(--muted);padding:4px 0}
.sys-msg span{background:#fff;padding:3px 12px;border-radius:20px;box-shadow:0 1px 6px var(--shadow2)}
.input-bar{display:flex;align-items:flex-end;gap:10px;padding:12px 0 16px;flex-shrink:0}
.input-wrap{flex:1;background:#fff;border-radius:22px;border:1.5px solid var(--blue-pale);display:flex;align-items:flex-end;padding:8px 16px;box-shadow:0 2px 12px var(--shadow2);transition:border-color .2s,box-shadow .2s}
.input-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(137,196,225,.12),0 2px 12px var(--shadow2)}
textarea#msg-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:2px 0;outline:none;resize:none;height:24px;min-height:24px;max-height:90px;line-height:1.5}
textarea#msg-input::placeholder{color:#c0d0da}
#send-btn{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--blue),var(--mint));color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px var(--shadow);transition:all .2s cubic-bezier(.4,0,.2,1);flex-shrink:0}
#send-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px var(--shadow)}
#send-btn:active{transform:scale(.95)}
</style>
</head>
<body>
<div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
<div id="app">
  <header>
    <div class="logo"><div class="logo-icon">🐱</div>meow chat</div>
    <div class="status-chip" id="status-chip"><div class="dot"></div><span id="conn-label">connecting</span></div>
  </header>
  <div id="splash">
    <div class="splash-icon">🐾</div>
    <div class="splash-text">warming up...</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>
  <div id="join-screen">
    <div class="join-card">
      <div class="join-header">
        <span class="join-emoji">🐱</span>
        <div class="join-title">meow chat</div>
        <div class="join-sub">soft &amp; secure peer-to-peer messaging</div>
      </div>
      <div class="field">
        <label>your name</label>
        <input type="text" id="name-input" placeholder="what should we call you?" maxlength="24" autocomplete="off">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="createRoom()">✨ create a room</button>
        <button class="btn btn-secondary" onclick="showJoinByLink()">🔗 join with a link</button>
      </div>
    </div>
    <div id="join-link-box">
      <div class="field">
        <label id="join-link-label">paste invite link or room code</label>
        <input type="text" id="link-input" placeholder="paste link here..." autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="joinByLink()">🐾 join room</button>
    </div>
  </div>
  <div id="chat-screen">
    <div class="chat-topbar">
      <div class="peer-info">
        <div class="peer-avatar">🐱</div>
        <div>
          <div class="peer-name" id="peer-name">waiting...</div>
          <div class="peer-status" id="peer-status">no one here yet</div>
        </div>
      </div>
    </div>
    <div class="share-box" id="share-box">
      <span>🔗</span>
      <span class="share-url" id="share-url"></span>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">copy</button>
    </div>
    <div id="system-banner"></div>
    <div id="messages"></div>
    <div class="input-bar">
      <div class="input-wrap"><textarea id="msg-input" placeholder="say something cute..."></textarea></div>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>
<script>
const socket=io();let myName='',myRoom='';
socket.on('connect',()=>setStatus('online','online'));
socket.on('disconnect',()=>setStatus('','offline'));
function setStatus(s,l){document.getElementById('status-chip').className='status-chip '+s;document.getElementById('conn-label').textContent=l}
window.addEventListener('load',()=>{
  const p=new URLSearchParams(location.search).get('room');
  setTimeout(()=>{
    document.getElementById('splash').style.display='none';
    document.getElementById('join-screen').style.display='flex';
    if(p){document.getElementById('link-input').value=p;document.getElementById('join-link-label').textContent='🐾 invite detected — enter your name & join!';document.getElementById('join-link-box').style.display='flex'}
  },1800);
});
function genRoomId(){const a=['fluffy','cozy','soft','dreamy','cloud','bubbly','gentle','sweet'],b=['paw','purr','nap','meow','hug','boop','wave','beam'];return`${a[Math.floor(Math.random()*a.length)]}-${b[Math.floor(Math.random()*b.length)]}-${Math.floor(Math.random()*900)+100}`}
function createRoom(){myName=document.getElementById('name-input').value.trim()||'anon';myRoom=genRoomId();startChat()}
function showJoinByLink(){const b=document.getElementById('join-link-box');b.style.display=b.style.display==='none'?'flex':'none'}
function joinByLink(){myName=document.getElementById('name-input').value.trim()||'anon';let v=document.getElementById('link-input').value.trim();try{const u=new URL(v);v=u.searchParams.get('room')||v}catch(e){}myRoom=v||genRoomId();startChat()}
function startChat(){socket.emit('join',{name:myName,room:myRoom});document.getElementById('join-screen').style.display='none';document.getElementById('chat-screen').style.display='flex';document.getElementById('peer-name').textContent='waiting for friend...';const u=`${location.origin}?room=${encodeURIComponent(myRoom)}`;document.getElementById('share-url').textContent=u;document.getElementById('share-box').classList.add('visible');document.getElementById('msg-input').focus()}
function copyLink(){navigator.clipboard.writeText(`${location.origin}?room=${encodeURIComponent(myRoom)}`).then(()=>{const b=document.getElementById('copy-btn');b.textContent='✓ copied!';b.classList.add('copied');setTimeout(()=>{b.textContent='copy';b.classList.remove('copied')},2000)})}
socket.on('status',({msg,type})=>{const b=document.getElementById('system-banner');b.textContent=msg;b.className=type;b.style.display='block';if(type==='waiting')setStatus('waiting','waiting');if(type==='connected'){setStatus('online','connected');document.getElementById('share-box').classList.remove('visible')}});
socket.on('peer_joined',({name})=>{document.getElementById('peer-name').textContent=name;document.getElementById('peer-status').textContent='online now 🟢';setStatus('online','connected');document.getElementById('share-box').classList.remove('visible');const b=document.getElementById('system-banner');b.textContent=`${name} joined the room 🐾`;b.className='connected';b.style.display='block';addSysMsg(`${name} joined 🐱`)});
socket.on('peer_left',({name})=>{document.getElementById('peer-name').textContent='waiting for friend...';document.getElementById('peer-status').textContent='no one here yet';setStatus('waiting','waiting');addSysMsg(`${name} left 🌙`);document.getElementById('share-box').classList.add('visible');const b=document.getElementById('system-banner');b.textContent=`${name} disconnected`;b.className='waiting';b.style.display='block'});
socket.on('message',({name,text,sid})=>addMessage(name,text,sid===socket.id));
function addMessage(name,text,isMine){const msgs=document.getElementById('messages'),now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),div=document.createElement('div');div.className='msg '+(isMine?'mine':'peer');div.innerHTML=`<div class="msg-meta">${isMine?myName:name} · ${now}</div><div class="msg-bubble">${esc(text)}</div>`;msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight}
function addSysMsg(t){const msgs=document.getElementById('messages'),d=document.createElement('div');d.className='sys-msg';d.innerHTML=`<span>${t}</span>`;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight}
function sendMessage(){const inp=document.getElementById('msg-input'),text=inp.value.trim();if(!text)return;socket.emit('message',{text});inp.value='';inp.focus()}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}})});
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Typing indicator
let typingTimer;
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('msg-input');
  inp.addEventListener('input', () => {
    socket.emit('typing', { typing: true });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => socket.emit('typing', { typing: false }), 1500);
  });
});

socket.on('typing', ({ name, typing }) => {
  let indicator = document.getElementById('typing-indicator');
  if (!indicator) {
    indicator = document.createElement('div');
    indicator.id = 'typing-indicator';
    indicator.style.cssText = 'font-size:0.7rem;color:var(--muted);padding:2px 4px;font-style:italic;min-height:20px;transition:opacity 0.2s;';
    document.getElementById('messages').after(indicator);
  }
  indicator.textContent = typing ? `${name} is typing...` : '';
});

// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('SW registered 🐱'))
      .catch(err => console.log('SW failed:', err));
  });
}

// Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.createElement('button');
  btn.textContent = '📲 Install App';
  btn.style.cssText = 'position:fixed;bottom:80px;right:16px;padding:10px 16px;background:linear-gradient(135deg,#7ec8e3,#a8e6cf);color:white;border:none;border-radius:20px;font-family:DM Sans,sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;box-shadow:0 4px 14px rgba(126,200,227,0.4);z-index:1000;';
  btn.onclick = () => { deferredPrompt.prompt(); btn.remove(); };
  document.body.appendChild(btn);
  setTimeout(() => btn.remove(), 15000);
});
</script>
</body>
</html>
